version: 2

models:
  - name: fct_vehicles_status
    description: "Real-time telemetry for Brussels mobility fleet"
    columns:
      - name: '"UID"' # The primary key we built
        tests:
          - unique
          - not_null
      - name: '"VEHICLE_ID"'
        tests:
          - not_null
          - relationships:
              to: ref('stg_voi_vehicles')
              field: vehicle_id # Verify this is lowercase in stg_voi_vehicles.sql

  - name: fct_trips_vianova
    description: "Historical trip data with precise PostGIS distance and routes"
    columns:
      - name: '"TRIP_ID"'
        tests:
          - unique
          - not_null
      - name: '"VEHICLE_ID"'
        tests:
          - not_null
          - relationships:
              to: ref('stg_voi_vehicles')
              field: vehicle_id
      - name: '"START_TS"'
        tests:
          - not_null