version: 2

models:
  - name: fct_vehicles_status
    description: "Real-time telemetry for all Brussels mobility fleets"
    columns:
      - name: '"UID"'
        tests:
          - unique
          - not_null
      - name: '"VEHICLE_ID"'
        tests:
          - not_null

  - name: fct_all_trips  # Changed from fct_trips_vianova
    description: "Unified historical trip data across all providers"
    columns:
      - name: '"TRIP_ID"'
        tests:
          - unique
          - not_null
      - name: '"VEHICLE_ID"'
        tests:
          - not_null
      - name: '"START_TS"'
        tests:
          - not_null